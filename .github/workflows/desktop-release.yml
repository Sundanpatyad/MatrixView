# Build DockX desktop for macOS (Apple Silicon + Intel), Linux, and Windows,
# then attach installers to a published GitHub Release.
#
# Trigger (tag only — not on normal branch pushes):
#   git tag v0.1.3
#   git push origin v0.1.3
#
# macOS publishable builds need these GitHub repo Secrets
# (Settings → Secrets and variables → Actions):
#   APPLE_ID                    Apple ID email
#   APPLE_PASSWORD              App-specific password (appleid.apple.com)
#   APPLE_TEAM_ID               10-char Team ID
#   APPLE_CERTIFICATE           base64 of Developer ID Application .p12
#   APPLE_CERTIFICATE_PASSWORD  password used when exporting the .p12
#   KEYCHAIN_PASSWORD           any random password for the CI keychain
#   APPLE_SIGNING_IDENTITY      optional; e.g. "Developer ID Application: Name (TEAMID)"
#
# Repo tip: Settings → Actions → General → Workflow permissions
# → “Read and write permissions”.

name: Desktop Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

env:
  VITE_API_URL: https://matrixview-569448299007.asia-south1.run.app

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
            arch_label: silicon
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_targets: x86_64-apple-darwin
            arch_label: intel
          - platform: ubuntu-22.04
            args: ''
            rust_targets: ''
            arch_label: linux
          - platform: windows-latest
            args: ''
            rust_targets: ''
            arch_label: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'
          cache-on-failure: true

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Import Apple Developer certificate
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "${APPLE_CERTIFICATE:-}" ]; then
            echo "::warning::APPLE_CERTIFICATE secret missing — macOS build will be unsigned."
            exit 0
          fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=DockX ${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build Tauri app & upload to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_API_URL: ${{ env.VITE_API_URL }}
          NO_STRIP: true
          # macOS signing + notarization (from GitHub Secrets — never commit these)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          tagName: ${{ steps.meta.outputs.tag }}
          releaseName: ${{ steps.meta.outputs.name }}
          releaseBody: |
            DockX desktop builds for this release.

            **Downloads**
            - **Windows**: `docx_windows.*`
            - **macOS Apple Silicon**: `docx_silicon.dmg`
            - **macOS Intel**: `docx_intel.dmg`
            - **Linux**: `docx_linux.*`

            macOS builds are signed and notarized when Apple secrets are configured.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          includeUpdaterJson: false
          # Include arch label so Silicon + Intel DMGs don't overwrite each other
          releaseAssetNamePattern: 'docx_${{ matrix.arch_label }}[ext]'
