# Build DockX desktop for macOS, Linux, and Windows, then attach
# installers to a GitHub Release (draft by default).
#
# Trigger (tag only — not on normal branch pushes):
#   git tag v0.1.2
#   git push origin v0.1.2
#
# Repo settings tip: Settings → Actions → General → Workflow permissions
# → “Read and write permissions” (needed to create releases).

name: Desktop Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

env:
  VITE_API_URL: https://matrixview-569448299007.asia-south1.run.app

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          # One macOS build only — asset names are docx.dmg / docx.app.tar.gz (no arch/version)
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust_targets: ''
          - platform: windows-latest
            args: ''
            rust_targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'
          cache-on-failure: true

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          # Tag from the push event (e.g. v0.1.2)
          TAG="${{ github.ref_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=DockX" >> "$GITHUB_OUTPUT"

      - name: Build Tauri app & upload to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_API_URL: ${{ env.VITE_API_URL }}
          # Avoid AppImage strip failures on newer glibc
          NO_STRIP: true
        with:
          projectPath: desktop
          tagName: ${{ steps.meta.outputs.tag }}
          releaseName: ${{ steps.meta.outputs.name }}
          releaseBody: |
            DockX desktop builds for this release.

            **Downloads**
            - **Windows**: `docx.exe` / `docx.msi`
            - **macOS**: `docx.dmg` (Apple Silicon)
            - **Linux**: `docx.AppImage` / `docx.deb` / `docx.rpm`

            Builds are unsigned unless signing secrets are configured.
            macOS: right-click → Open on first launch if Gatekeeper blocks the app.
            Windows: SmartScreen may warn on unsigned installers.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          includeUpdaterJson: false
          # Plain names only: docx.dmg, docx.exe, docx.AppImage, docx.deb, etc.
          releaseAssetNamePattern: 'docx[ext]'

