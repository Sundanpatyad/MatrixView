name: Build Windows

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'VITE_API_URL baked into the desktop build'
        required: false
        default: 'https://matrixview-569448299007.asia-south1.run.app'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri Windows app
        env:
          VITE_API_URL: ${{ inputs.api_url }}
        run: npm run tauri:build

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: DockX-Windows
          path: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/DockX.exe
          if-no-files-found: error
